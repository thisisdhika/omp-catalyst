      worker-expert: kilo/poolside/laguna-m.1:free
      worker-hyper: opencode-zen/deepseek-v4-flash-free
      reviewer: kilo/poolside/laguna-m.1:free
      tester: kilo/poolside/laguna-xs.2:free
      designer: kilo/poolside/laguna-m.1:free
      debugger: opencode-zen/deepseek-v4-flash-free
      oracle: kilo/poolside/laguna-m.1:free
      kugutsu: opencode-zen/deepseek-v4-flash-free
