# Catalyst Squad — model mode definitions
#
# Place under `catalyst.modes` in your OMP config:
#   ~/.omp/agent/config.yml   (global)
#   .omp/config.yml            (project — overrides global)
#
# Each mode maps specialist names to model specs.
# Unset specialist/mode pairs fall back to the agent's frontmatter model.
# Custom mode names are supported (any key under `modes`).

catalyst:
  modes:
    free:
      scout: kilo/poolside/laguna-m.1:free
      researcher: opencode-zen/deepseek-v4-flash-free
      planner: kilo/poolside/laguna-m.1:free
